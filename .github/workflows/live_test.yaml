name: Test action main branch

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"  # every hour

jobs:
  clean-v300:
    runs-on: ubuntu-latest
    name: Delete test-1-* images with v3.0.0 (PAT)
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch multi-platform package version SHAs
        id: multi-arch-digests
        run: |
          digest300=$(docker manifest inspect ghcr.io/snok/container-retention-policy:v3.0.0 | jq -r '.manifests[].digest' | paste -s -d ' ' -)
          digest301=$(docker manifest inspect ghcr.io/snok/container-retention-policy:v3.0.1 | jq -r '.manifests[].digest' | paste -s -d ' ' -)
          echo "multi-arch-digests=$digest300 $digest301" >> $GITHUB_OUTPUT

      - uses: snok/container-retention-policy@v3.0.0
        with:
          account: snok
          token: ${{ secrets.PAT }}
          cut-off: 30m
          image-names: container-retention-policy
          image-tags: test-1*
          tag-selection: both
          timestamp-to-use: created_at
          dry-run: false
          rust-log: container_retention_policy=debug
          skip-shas: ${{ steps.multi-arch-digests.outputs.multi-arch-digests }}

  clean-v301:
    needs: clean-v300
    runs-on: ubuntu-latest
    name: Delete test-2-* images with v3.0.1 (PAT)
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch multi-platform package version SHAs
        id: multi-arch-digests
        run: |
          digest300=$(docker manifest inspect ghcr.io/snok/container-retention-policy:v3.0.0 | jq -r '.manifests[].digest' | paste -s -d ' ' -)
          digest301=$(docker manifest inspect ghcr.io/snok/container-retention-policy:v3.0.1 | jq -r '.manifests[].digest' | paste -s -d ' ' -)
          echo "multi-arch-digests=$digest300 $digest301" >> $GITHUB_OUTPUT

      - uses: snok/container-retention-policy@v3.0.1
        with:
          account: snok
          token: ${{ secrets.PAT }}
          cut-off: 30m
          image-names: container-retention-policy
          image-tags: test-2*
          tag-selection: both
          timestamp-to-use: created_at
          dry-run: false
          rust-log: container_retention_policy=debug
          skip-shas: ${{ steps.multi-arch-digests.outputs.multi-arch-digests }}

  produce-v300:
    needs: clean-v300
    runs-on: ubuntu-latest
    name: Upload test-1-* images
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push test-1-* images
        run: |
          randomString=$(LC_ALL=C tr -dc A-Za-z0-9 </dev/urandom | head -c 10 2>/dev/null || echo RANDOM)
          {
            echo "FROM alpine AS builder"
            echo "RUN echo \"$randomString\" > test.txt"
            echo "FROM scratch"
            echo "COPY --from=builder /test.txt ."
          } > Dockerfile

          docker build -f Dockerfile -t "ghcr.io/snok/container-retention-policy:test-1" --push .

          for ((j=1; j<=3; j++))
          do
            docker tag "ghcr.io/snok/container-retention-policy:test-1" "ghcr.io/snok/container-retention-policy:test-1-${j}"
            docker push "ghcr.io/snok/container-retention-policy:test-1-${j}"
          done

  clean-main:
    needs: clean-v301
    runs-on: ubuntu-latest
    name: Delete test-3-* images with main branch (temporal token, no skip-shas)
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@v6
      - uses: swatinem/rust-cache@v2
      - name: Build main branch binary
        run: cargo build --release
      - name: Delete test-3-* images
        run: |
          ./target/release/container-retention-policy \
            --account=snok \
            --token="${{ secrets.GITHUB_TOKEN }}" \
            --cut-off=30m \
            --image-names=container-retention-policy \
            --shas-to-skip="" \
            --image-tags="test-3*" \
            --tag-selection=both \
            --timestamp-to-use=created_at \
            --dry-run=false
        env:
          RUST_LOG: container_retention_policy=debug

  produce-v301:
    needs: clean-v301
    runs-on: ubuntu-latest
    name: Upload test-2-* images
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push test-2-* images
        run: |
          randomString=$(LC_ALL=C tr -dc A-Za-z0-9 </dev/urandom | head -c 10 2>/dev/null || echo RANDOM)
          {
            echo "FROM alpine AS builder"
            echo "RUN echo \"$randomString\" > test.txt"
            echo "FROM scratch"
            echo "COPY --from=builder /test.txt ."
          } > Dockerfile

          docker build -f Dockerfile -t "ghcr.io/snok/container-retention-policy:test-2" --push .

          for ((j=1; j<=3; j++))
          do
            docker tag "ghcr.io/snok/container-retention-policy:test-2" "ghcr.io/snok/container-retention-policy:test-2-${j}"
            docker push "ghcr.io/snok/container-retention-policy:test-2-${j}"
          done

  produce-main:
    needs: clean-main
    runs-on: ubuntu-latest
    name: Upload test-3-* and multi-arch images
    steps:
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push test-3-* images
        run: |
          randomString=$(LC_ALL=C tr -dc A-Za-z0-9 </dev/urandom | head -c 10 2>/dev/null || echo RANDOM)
          {
            echo "FROM alpine AS builder"
            echo "RUN echo \"$randomString\" > test.txt"
            echo "FROM scratch"
            echo "COPY --from=builder /test.txt ."
          } > Dockerfile

          docker build -f Dockerfile -t "ghcr.io/snok/container-retention-policy:test-3" --push .

          for ((j=1; j<=3; j++))
          do
            docker tag "ghcr.io/snok/container-retention-policy:test-3" "ghcr.io/snok/container-retention-policy:test-3-${j}"
            docker push "ghcr.io/snok/container-retention-policy:test-3-${j}"
          done
      - name: Build and push multi-arch test image
        run: |
          randomString=$(LC_ALL=C tr -dc A-Za-z0-9 </dev/urandom | head -c 10 2>/dev/null || echo RANDOM)
          {
            echo "FROM alpine AS builder"
            echo "RUN echo \"$randomString\" > test.txt"
            echo "FROM scratch"
            echo "COPY --from=builder /test.txt ."
          } > Dockerfile

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/snok/container-retention-policy:test-multi-arch \
            --push .
